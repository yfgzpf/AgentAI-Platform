name: PR Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  lint-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
        fetch-depth: 0

      - name: Scan for secrets
        run: |
          if grep -rE "sk-[a-zA-Z0-9]{32,}|pk-[a-zA-Z0-9]{32,}|AKIA[A-Z0-9]{16}" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.json" --include="*.md" --include="*.yml" .; then
            echo "❌ Found potential secret patterns!"
            exit 1
          fi
          echo "✅ No secrets found"
