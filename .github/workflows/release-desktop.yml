name: Release Desktop

on:
  push:
    tags: ['v*.*.*']

jobs:
  build-desktop:
    name: Build Tauri Desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./packages/agentai-desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri
        run: pnpm --filter @agentai/desktop tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agentai-desktop-${{ matrix.os }}
          path: |
            packages/agentai-desktop/src-tauri/target/release/bundle/**/*.exe
            packages/agentai-desktop/src-tauri/target/release/bundle/**/*.dmg
            packages/agentai-desktop/src-tauri/target/release/bundle/**/*.AppImage
            packages/agentai-desktop/src-tauri/target/release/bundle/**/*.deb
            packages/agentai-desktop/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
