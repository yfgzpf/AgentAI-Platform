[package]
name = "agentai-desktop"
version = "0.1.0-alpha.1"
description = "AgentAI Platform - Tauri 2.0 desktop shell"
authors = ["AgentAI Builder"]
edition = "2021"
rust-version = "1.75"

[lib]
name = "agentai_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [] }
tauri-plugin-shell = "2.0"
tauri-plugin-process = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
env_logger = "0.11"

[features]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
opt-level = "s"  # Optimize for size (关键: 5-10MB 安装包)
lto = true       # Link-time optimization
codegen-units = 1
panic = "abort"
strip = true
