# go-cqhttp 配置示例
# 复制为 config.yml 并修改

account: # 账号相关
  uin: 123456789  # QQ 账号
  password: ''    # 密码 (留空用扫码)
  encrypt: false  # 是否密码加密
  status: 5       # 在线状态 5=在线
  relogin:        # 重连设置
    delay: 3
    interval: 6
    max-times: 0

message:
  type: 'ws'      # 消息服务: ws (反向 WebSocket)
  server: 'ws://127.0.0.1:5700'  # 反向 WS 地址 (agentai-qqbot 监听)
  token: ''       # 可选, 鉴权 token

servers:          # go-cqhttp 自己也启个 WS server
  - ws:
      address: 127.0.0.1:5700
      version: forward
      token: ''

# sign-servers:  # 签名服务 (高风险, 可不填)
#   - url: https://sign.example.com
#     key: 'your-key'

# 默认不自动同意加好友 / 加群
heartbeat:
  enabled: false

# 不要输出 debug 日志 (刷屏)
debug: false
